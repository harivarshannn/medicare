<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMinds AI | Admin RAG Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

    <!-- NAVIGATION HEADER -->
    <nav class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <svg class="h-8 w-8 text-[#1a8093]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-3.12 3 3 0 0 1 0-4.88 2.5 2.5 0 0 1 0-3.12A2.5 2.5 0 0 1 9.5 2Z"/>
                    <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-3.12 3 3 0 0 0 0-4.88 2.5 2.5 0 0 0 0-3.12A2.5 2.5 0 0 0 14.5 2Z"/>
                </svg>
                <div class="text-lg font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-[#1a8093] via-[#3d60b1] to-[#6f49c5] tracking-tight">
                    RisenPsyLabs <span class="text-xs font-semibold text-slate-400">Admin Document Library</span>
                </div>
            </a>
            
            <div class="flex items-center gap-4">
                <span id="user-display-name" class="text-sm font-semibold text-slate-600">Administrator</span>
                <button onclick="handleLogout()" class="px-4 py-2 text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg border border-red-200 transition-colors uppercase tracking-wider">
                    Sign Out
                </button>
            </div>
        </div>
    </nav>

    <!-- CONTENT PORTAL -->
    <div class="flex-grow max-w-2xl w-full mx-auto px-4 py-12 space-y-8">
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-6">
            <div>
                <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-2"><i class="fa-solid fa-key text-[#1a8093]"></i> Admin RAG Reference Uploads</h2>
                <p class="text-sm text-slate-500">Upload clinical reference textbooks to index. The platform checks MD5 hashes to prevent duplicate entries in FAISS vector store.</p>
            </div>

            <form id="uploadForm" onsubmit="handlePdfUpload(e)" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase">Knowledge Category Folder</label>
                    <select id="uploadCategory" class="w-full px-3 py-2 border border-slate-200 rounded-lg bg-white text-sm focus:outline-none focus:border-[#1a8093]">
                        <option value="psychology">psychology</option>
                        <option value="cbt">cbt</option>
                        <option value="guidelines">guidelines</option>
                        <option value="assessments">assessments</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase">Choose clinical reference PDF</label>
                    <div class="border-2 border-dashed border-slate-200 hover:border-[#1a8093] rounded-xl p-8 text-center cursor-pointer transition-colors relative" id="dropzone">
                        <input type="file" id="uploadFile" accept=".pdf" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <i class="fa-regular fa-file-pdf text-4xl text-slate-300 mb-3"></i>
                        <p class="text-sm font-semibold text-slate-600" id="file-label">Drag and drop clinical PDF here, or click to browse</p>
                        <p class="text-[10px] text-slate-400 mt-1">Accepts PDF files only up to 100MB</p>
                    </div>
                </div>

                <div id="statusMessage" class="text-xs font-bold hidden p-3 rounded-lg"></div>

                <button type="submit" id="btn-submit-upload" class="w-full py-3 bg-gradient-to-r from-[#1a8093] to-[#3d60b1] text-white font-bold text-xs rounded-lg shadow-md hover:shadow-lg transition-all uppercase tracking-wider">
                    Upload & Index to Vector DB &rarr;
                </button>
            </form>
        </section>

    </div>

    <!-- SCRIPT -->
    <script>
        let currentUser = null;

        document.addEventListener("DOMContentLoaded", () => {
            const stored = localStorage.getItem("user");
            if (!stored) {
                window.location.href = "/";
                return;
            }
            currentUser = JSON.parse(stored);
            document.getElementById("user-display-name").innerText = currentUser.full_name;

            // Handle file selection displays
            const fileInput = document.getElementById("uploadFile");
            const label = document.getElementById("file-label");
            fileInput.addEventListener("change", (e) => {
                if (fileInput.files.length > 0) {
                    label.innerText = `Selected: ${fileInput.files[0].name}`;
                } else {
                    label.innerText = "Drag and drop clinical PDF here, or click to browse";
                }
            });

            // Prevent form submit default behavior
            document.getElementById("uploadForm").addEventListener("submit", handlePdfUpload);
        });

        async function handlePdfUpload(e) {
            e.preventDefault();
            const category = document.getElementById("uploadCategory").value;
            const fileInput = document.getElementById("uploadFile");
            const status = document.getElementById("statusMessage");
            const btn = document.getElementById("btn-submit-upload");

            if (fileInput.files.length === 0) return;

            status.classList.remove("hidden", "bg-red-50", "text-red-700", "bg-green-50", "text-green-700", "bg-blue-50", "text-blue-700");
            status.classList.add("bg-blue-50", "text-blue-700");
            status.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Extracting PDF text and generating sentence-transformer embeddings...`;
            btn.setAttribute("disabled", "true");
            btn.classList.add("opacity-50");

            const formData = new FormData();
            formData.append("category", category);
            formData.append("user_id", currentUser.id);
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch("/api/admin/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                status.classList.remove("bg-blue-50", "text-blue-700");

                if (response.ok && data.success) {
                    status.classList.add("bg-green-50", "text-green-700");
                    if (data.chunks_indexed > 0) {
                        status.innerHTML = `<i class="fa-solid fa-check-double mr-1"></i> Successfully uploaded ${data.filename}! Generated & indexed ${data.chunks_indexed} new text embeddings.`;
                    } else {
                        status.innerHTML = `<i class="fa-solid fa-info-circle mr-1"></i> File already exists in FAISS database index. Index is up to date (Skipped duplicate indexing).`;
                    }
                    fileInput.value = "";
                    document.getElementById("file-label").innerText = "Drag and drop clinical PDF here, or click to browse";
                } else {
                    status.classList.add("bg-red-50", "text-red-700");
                    status.innerText = data.detail || "File upload failed.";
                }
            } catch (err) {
                status.classList.remove("bg-blue-50", "text-blue-700");
                status.classList.add("bg-red-50", "text-red-700");
                status.innerText = "Error connecting to server. Please verify backend state.";
            } finally {
                btn.removeAttribute("disabled");
                btn.classList.remove("opacity-50");
            }
        }

        function handleLogout() {
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
